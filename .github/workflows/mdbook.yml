name: Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Prune dangling worktree symlinks
        # The software is a bare-store worktree (call/0010), not materialized in
        # CI, so its `.claude/skills/*` symlinks dangle. The docs (src = ".") don't
        # include them; prune broken symlinks so `mdbook build` doesn't choke.
        run: find . -type l ! -exec test -e {} \; -print -delete
      - name: Build site
        run: mdbook build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
